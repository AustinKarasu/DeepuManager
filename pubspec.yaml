name: deepu_logger
description: VPS-backed stock register management app for Deepu Manager.
publish_to: "none"
version: 1.0.9+9

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  intl: ^0.19.0
  uuid: ^4.4.2
  crypto: ^3.0.5
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.4
  syncfusion_flutter_xlsio: ^26.2.14
  syncfusion_flutter_pdf: ^26.2.14
  syncfusion_flutter_charts: ^26.2.14
  excel: ^4.0.6
  dio: ^5.7.0
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
